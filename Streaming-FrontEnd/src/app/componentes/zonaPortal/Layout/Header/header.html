<header class="app-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-logo">
        <a routerLink="/header" aria-label="Ir al inicio">
          <img ngSrc="/img/KeySound_logo_definitive.png" alt="KeySound logo" class="logo-image" width="132" height="44" priority>
        </a>
      </div>

      <nav class="header-nav" aria-label="Navegacion principal">
        <ul class="nav-list">
          @for (item of navItems; track item.route) {
            <li class="nav-item">
              <a [routerLink]="item.route" routerLinkActive="active" class="nav-link">
                @if (item.icon) {
                  <span class="material-icons nav-icon" aria-hidden="true">{{ item.icon }}</span>
                }
                <span class="nav-label">{{ item.label }}</span>
              </a>
            </li>
          }
        </ul>
      </nav>

      <div class="header-actions">
        <button class="user-avatar" (click)="openProfile()" [attr.aria-label]="'Perfil de ' + currentUser().name">
          <img [src]="currentUser().avatar" [alt]="currentUser().name" class="avatar-image">
        </button>

        <button class="settings-button" (click)="openSettings()" aria-label="Ajustes">
          <span class="material-icons" aria-hidden="true">settings</span>
        </button>
      </div>
    </div>

    <div class="header-search">
      <div class="search-container">
        <span class="material-icons search-icon" aria-hidden="true">search</span>
        <input
          type="text"
          class="search-input"
          placeholder="Que quieres escuchar hoy?"
          [value]="searchTerm()"
          (input)="searchTerm.set($any($event.target).value)"
          (keyup.enter)="onSearch()"
          aria-label="Buscar musica, artistas o podcasts">

        @if (searchTerm()) {
          <button class="clear-button" (click)="clearSearch()" aria-label="Limpiar busqueda">
            <span class="material-icons" aria-hidden="true">close</span>
          </button>
        }

        <button class="search-submit" type="button" (click)="onSearch()" aria-label="Iniciar busqueda">
          Buscar
        </button>
      </div>
    </div>
  </div>
</header>

<main class="page-content" aria-label="Contenido principal de ejemplo"></main>

<app-footer class="page-footer"></app-footer>
