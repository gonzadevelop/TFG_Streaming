<header class="app-header">
  <!-- Fila principal: Logo + Buscador + Usuario -->
  <div class="header-main">
    <div class="header-left">
      <button
        type="button"
        class="sidebar-toggle"
        (click)="toggleSidebar()"
        [attr.aria-expanded]="isSidebarOpen()"
        aria-controls="artist-sidebar"
        aria-label="Alternar barra lateral">
        <span class="material-icons" aria-hidden="true">menu</span>
      </button>
      <div class="header-logo">
        <a routerLink="/" aria-label="Inicio KeySound">
          <img
            ngSrc="img/KeySound_logo_definitive_miniatura.png"
            alt="KeySound"
            width="36"
            height="36"
            class="logo-image"
            priority />
        </a>
        <span class="logo-name">KeySound</span>
      </div>
    </div>

    <div class="search-container">
      <span class="material-icons search-icon" aria-hidden="true">search</span>
      <label for="search-input" class="visually-hidden">Buscar</label>
      <input
        id="search-input"
        type="search"
        class="search-input"
        placeholder="Buscar artistas, canciones, álbumes..."
        [value]="searchTerm()"
        (input)="searchTerm.set($any($event.target).value)"
        (keyup.enter)="onSearch()"
        aria-label="Campo de búsqueda" />
      @if (searchTerm()) {
        <button
          type="button"
          class="clear-button"
          (click)="clearSearch()"
          aria-label="Limpiar búsqueda">
          <span class="material-icons" aria-hidden="true">close</span>
        </button>
      }
    </div>
  </div>
</header>
