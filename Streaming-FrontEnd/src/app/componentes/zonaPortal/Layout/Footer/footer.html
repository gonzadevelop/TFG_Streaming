<footer class="app-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="/img/KeySound_logo_definitive_miniatura.png" alt="KeySound" class="footer-logo">
      <p class="footer-text">Tu musica, tus reglas.</p>
    </div>

    <nav class="footer-nav" aria-label="Enlaces del pie de pagina">
      @for (item of links; track item.label) {
        <a [href]="item.href" class="footer-link">{{ item.label }}</a>
      }
    </nav>

    <p class="footer-copy">&copy; {{ year }} KeySound. Todos los derechos reservados.</p>
  </div>
</footer>
