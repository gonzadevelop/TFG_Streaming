<section class="playlist-page">
  <div class="playlist-gradient-bg"></div>

  <header class="playlist-header">
    <div class="playlist-cover-container">
      @if (playlist().urlPortada) {
        <img
          class="playlist-cover"
          [src]="playlist().urlPortada"
          [alt]="'Portada de ' + playlist().nombre"
          loading="lazy"
        />
      } @else {
        <div class="playlist-cover-placeholder">
          <span class="playlist-cover-icon" aria-hidden="true">♪</span>
        </div>
      }
    </div>

    <div class="playlist-info">
      <span class="playlist-type">Playlist</span>
      <h1 class="playlist-title">{{ playlist().nombre }}</h1>
      <div class="playlist-meta">
        @if (playlist().descripcion) {
          <p class="playlist-desc mb-0">{{ playlist().descripcion }}</p>
        }
        <span class="playlist-stats">
          <span class="playlist-author">Keysound</span> • {{ playlist().pistas.length || 0 }} canciones
        </span>
      </div>
    </div>
  </header>

  <div class="playlist-actions">
    <button class="btn-play-large" aria-label="Reproducir">
      ▶
    </button>
  </div>

  <div class="playlist-content">
    <app-lista-canciones
      [pistas]="playlist().pistas || []"/>
  </div>
</section>
