<section class="artista-page" aria-labelledby="titulo-zona-artista">
  <div class="artista-content">
    <header class="artista-hero">
      <div>
        <p class="kicker">Panel de control</p>
        <h1 id="titulo-zona-artista">{{ nombreArtistico }}</h1>
        <p class="description">
          Gestiona tu catalogo, revisa reproducciones y mantiene el control de tus lanzamientos.
        </p>
      </div>

      <button type="button" class="btn-principal" (click)="submitNewSong()">
        Subir nuevo tema
      </button>
    </header>

    @if (uploadMessage()) {
      <p class="action-message">{{ uploadMessage() }}</p>
    }

    @if (mostrarFormulario()) {
      <section class="upload-form-card">
        <h2>Subir nuevo tema</h2>

        <form>
          <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" class="form-control" placeholder="Nombre del tema">
          </div>

          <div class="mb-3">
            <label class="form-label">Archivo de audio</label>
            <input type="file" class="form-control" accept="audio/*">
          </div>

          <div class="mb-3">
            <label class="form-label">Portada</label>
            <input type="file" class="form-control" accept="image/*">
          </div>

          <div class="d-flex gap-2">
            <button type="button" class="btn btn-success">Guardar</button>
            <button type="button" class="btn btn-secondary" (click)="cerrarFormulario()">Cancelar</button>
          </div>
        </form>
      </section>
    }
  </div>
</section>
