<div class="d-flex justify-content-center align-items-center vh-100 login-content">
  <div class="card shadow-lg login-card p-4 p-md-5">

    <!-- Mensaje de error -->
    @if (errorMessage()) {
      <div class="alert alert--error" role="alert" aria-live="assertive">
        <span class="material-icons alert__icon" aria-hidden="true">error</span>
        <span class="alert__text">{{ errorMessage() }}</span>
        <button type="button" class="alert__close" (click)="cerrarError()" aria-label="Cerrar mensaje de error">
          <span class="material-icons" aria-hidden="true">close</span>
        </button>
        <div class="alert__progress" aria-hidden="true"></div>
      </div>
    }

    <!-- Cabecera -->
    <div class="text-center mb-4">
      <img class="login-icon" src="/img/KeySound_logo_definitive.png" alt="KeySound logo">
      <h3 class="fw-bold mb-1">INICIAR SESIÓN</h3>
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <!-- Campo usuario / email -->
      <div class="mb-3">
        <label for="user" class="form-label fw-semibold small">Correo electrónico</label>
        <div class="input-group">
          <input
            type="email"
            class="form-control"
            id="user"
            formControlName="user"
            placeholder=""
            autocomplete="email"
            required
          >
        </div>
      </div>

      <!-- Campo contraseña -->
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold small">Contraseña</label>
        <div class="input-group">
          <input
            [type]="mostrarPassword() ? 'text' : 'password'"
            class="form-control"
            id="password"
            formControlName="password"
            placeholder=""
            autocomplete="current-password"
            required
          >
          <button
            type="button"
            class="btn border-start-0"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="mostrarPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            @if (mostrarPassword()) {
              <i class="bi bi-eye-slash"></i>
            } @else {
              <i class="bi bi-eye"></i>
            }
          </button>
        </div>
      </div>

      <!-- Enlace olvidé contraseña -->
      <div class="text-end mb-3">
        <a href="#" class="forgot-link text-decoration-none fw-semibold small">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Botón iniciar sesión -->
      <button
        type="submit"
        class="btn btn-submit w-100 py-2 mb-3"
        [disabled]="loginForm.invalid || isLoading()"
      >
        @if (isLoading()) {
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Iniciando sesión...
        } @else {
          Iniciar sesión
        }
      </button>

      <!-- Divisor -->
      <div class="divider my-3" role="separator" aria-orientation="horizontal">
        <span class="divider-text">o bien</span>
      </div>

      <!-- Botón volver -->
      <button
        type="button"
        class="btn-back w-100 py-2"
        (click)="goBack()"
        aria-label="Volver atrás"
        routerLink=""
      >
        ← Volver
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      ¿No tienes una cuenta?
      <a routerLink="/register" class="text-decoration-none fw-semibold forgot-link">Crear cuenta.</a>
    </p>

  </div>
</div>
