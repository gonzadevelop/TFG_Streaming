spring.application.name                     = KeySound-BackEnd

server.port                                 = 8080

# Database Configuration
spring.datasource.url                       = ${DB_URL}
spring.datasource.username                  = ${DB_ROOT_USER}
spring.datasource.password                  = ${DB_ROOT_PASSWORD}
spring.jpa.hibernate.ddl-auto               = update
spring.jpa.show-sql                         = true
spring.jpa.properties.hibernate.format_sql  = true

# Tamanio maximo permitido para UN solo archivo
spring.servlet.multipart.max-file-size      = 10MB

# Tamanio maximo permitido para toda una PETICION
spring.servlet.multipart.max-request-size   = 50MB