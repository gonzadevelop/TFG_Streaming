spring.application.name                     = KeySound-BackEnd

server.port                                 = 8080

# Database Configuration
spring.datasource.url                       = jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username                  = ${DB_USER}
spring.datasource.password                  = ${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto               = validate
spring.jpa.show-sql                         = true
spring.jpa.properties.hibernate.format_sql  = true

# Firebase Configuration
# Tamanio maximo permitido para un solo archivo y para una solicitud completa (puede incluir varios archivos)
spring.servlet.multipart.max-file-size      = 10MB
spring.servlet.multipart.max-request-size   = 120MB

# Context path para la aplicaciˇn
server.servlet.context-path                 = /api

#Time zone configuration
spring.jpa.properties.hibernate.jdbc.time_zone = UTC+1