spring.application.name                     = KeySound-BackEnd

server.port                                 = 8080

spring.datasource.url                       = jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&trustServerCertificate=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username                  = ${DB_USER}
spring.datasource.password                  = ${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto               = validate
spring.datasource.driver-class-name         = com.mysql.cj.jdbc.Driver
spring.jpa.show-sql                         = true
spring.jpa.properties.hibernate.format_sql  = true

spring.servlet.multipart.max-file-size      = 10MB
spring.servlet.multipart.max-request-size   = 120MB

server.servlet.context-path                 = /api

spring.jpa.properties.hibernate.jdbc.time_zone = UTC+1